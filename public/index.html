<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aiworkclub</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ea;
        --ink: #111111;
        --muted: #5d564a;
        --accent: #d94f04;
        --card: rgba(255, 255, 255, 0.75);
        --line: rgba(17, 17, 17, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(217, 79, 4, 0.15), transparent 35%),
          linear-gradient(135deg, #f6f3ea 0%, #efe7d7 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .panel {
        width: min(720px, 100%);
        padding: 40px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 80px rgba(17, 17, 17, 0.08);
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(40px, 7vw, 82px);
        line-height: 0.95;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
        padding: 12px 16px;
        border-radius: 999px;
        background: #111111;
        color: #ffffff;
        font-size: 14px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #57d364;
        box-shadow: 0 0 16px rgba(87, 211, 100, 0.8);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="eyebrow">Cloudflare Pages Probe</div>
        <h1>aiworkclub</h1>
        <p>这是一个用于验证 Git 初始化、GitHub 远程仓库推送和 Cloudflare Pages 部署链路的最小静态页面。</p>
        <p>下一步只需要 Cloudflare 账号完成一次 Wrangler 登录，就可以直接执行部署。</p>
        <div class="status">
          <span class="dot"></span>
          Static HTML ready
        </div>
      </section>
    </main>
  </body>
</html>
